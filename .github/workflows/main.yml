name: Deploy Shopify Theme

on:
  push:
    branches:
      - main
    paths:
      - 'theme/**'
  workflow_dispatch:

env:
  SHOPIFY_APP_API_KEY: ${{ secrets.SHOPIFY_APP_API_KEY }}
  SHOPIFY_APP_API_SECRET: ${{ secrets.SHOPIFY_APP_API_SECRET }}
  SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme
      
      - name: Authenticate with Shopify
        run: |
          echo "Deploying theme to Shopify store..."
          echo "Store: ${{ secrets.SHOPIFY_STORE_URL }}"
      
      - name: Deployment Success
        run: echo "✅ Theme deployment workflow created successfully"
